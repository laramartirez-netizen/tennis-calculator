<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lara's Tennis Fee Calculator</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 950px;
    background: white;
    border-radius: 28px;
    padding: 30px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #1f2937;
}

h2 {
    margin-top: 30px;
    color: #374151;
}

label {
    display: block;
    margin-top: 14px;
    font-weight: 600;
    color: #374151;
}

input, select {
    width: 100%;
    padding: 12px 14px;
    margin-top: 6px;
    border-radius: 14px;
    border: 1px solid #d1d5db;
    font-size: 15px;
    background: #f9fafb;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 20px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.25s;
}

.add-btn {
    background: #22c55e;
    color: white;
}

.add-btn:hover {
    background: #16a34a;
}

.calc-btn {
    background: #2563eb;
    color: white;
}

.calc-btn:hover {
    background: #1d4ed8;
}

.remove-btn {
    background: #ef4444;
    color: white;
}

.remove-btn:hover {
    background: #dc2626;
}

.court-carousel {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding-bottom: 15px;
    margin-top: 15px;
}

.court-card {
    min-width: 270px;
    background: #f8fafc;
    border-radius: 22px;
    padding: 20px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.05);
    flex-shrink: 0;
}

.court-card h3 {
    text-align: center;
    margin-bottom: 10px;
}

.results {
    margin-top: 25px;
    background: #f3f4f6;
    border-radius: 20px;
    padding: 22px;
    line-height: 1.7;
}

.message-box {
    margin-top: 15px;
    background: white;
    border: 1px solid #d1d5db;
    border-radius: 18px;
    padding: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎾 Lara's Tennis Fee Calculator</h1>

    <label>Total Number of Players</label>
    <input type="number" id="totalPlayers" value="14" min="1">

    <label>Number of Members</label>
    <input type="number" id="members" value="6" min="0">

    <label>Guest Fee (₱)</label>
    <input type="number" id="guestFee" value="250" min="0">

    <label>Tennis Fund Fee / Hour / Court (₱)</label>
    <input type="number" id="tennisFundFee" value="20" min="0">

    <label>Total Tip (₱)</label>
    <input type="number" id="totalTip" value="0" min="0">

    <h2>Courts</h2>

    <button class="add-btn" onclick="addCourtCard()">+ Add Court</button>

    <div class="court-carousel" id="courtCarousel"></div>

    <button class="calc-btn" onclick="calculateFees()">Calculate Fees</button>

    <div class="results" id="results"></div>
</div>

<script>
const BALLBOY_FEE = 140;
let courtCount = 0;

function addCourtCard(hours=3, ballboys=2, lights='with', ballcan=true, ballcanFee=350) {
    courtCount++;

    const card = document.createElement('div');
    card.className = 'court-card';
    card.id = 'courtCard' + courtCount;

    card.innerHTML = `
        <h3>Court ${courtCount}</h3>

        <label>Hours</label>
        <input type="number" value="${hours}" min="0">

        <label>Ball Boys</label>
        <input type="number" value="${ballboys}" min="0">

        <label>Lights</label>
        <select>
            <option value="with" ${lights==='with'?'selected':''}>Yes</option>
            <option value="without" ${lights==='without'?'selected':''}>No</option>
        </select>

        <label>Ball Can?</label>
        <select onchange="toggleBallCan(this)">
            <option value="no" ${!ballcan?'selected':''}>No</option>
            <option value="yes" ${ballcan?'selected':''}>Yes</option>
        </select>

        <div class="ballcan-container" style="display:${ballcan?'block':'none'};">
            <label>Ball Can Fee (₱)</label>
            <input type="number" value="${ballcanFee}" min="0">
        </div>

        <button class="remove-btn" onclick="removeCourtCard('${card.id}')">Remove Court</button>
    `;

    document.getElementById('courtCarousel').appendChild(card);
}

function toggleBallCan(select) {
    const container = select.parentElement.querySelector('.ballcan-container');
    container.style.display = select.value === 'yes' ? 'block' : 'none';
}

function removeCourtCard(id) {
    document.getElementById(id).remove();
}

function calculateFees() {
    const totalPlayers = Number(document.getElementById('totalPlayers').value);
    const members = Number(document.getElementById('members').value);
    const guests = Math.max(0, totalPlayers - members);

    const guestFee = Number(document.getElementById('guestFee').value);
    const tennisFundFee = Number(document.getElementById('tennisFundFee').value);
    const totalTip = Number(document.getElementById('totalTip').value);

    let courtCost = 0;
    let ballboyCost = 0;
    let tennisFundCost = 0;
    let ballcanCost = 0;
    let breakdown = '';

    document.querySelectorAll('.court-card').forEach((card, index) => {
        const inputs = card.querySelectorAll('input');
        const selects = card.querySelectorAll('select');

        const hours = Number(inputs[0].value);
        const ballboys = Number(inputs[1].value);
        const lights = selects[0].value;
        const ballcan = selects[1].value;

        const courtFee = lights === 'with' ? 190 : 88;

        const thisCourt = hours * courtFee;
        const thisBallboy = hours * ballboys * BALLBOY_FEE;
        const thisTennisFund = hours * tennisFundFee;

        let thisBallcan = 0;
        if (ballcan === 'yes') {
            thisBallcan = Number(inputs[2]?.value || 0);
        }

        courtCost += thisCourt;
        ballboyCost += thisBallboy;
        tennisFundCost += thisTennisFund;
        ballcanCost += thisBallcan;

        breakdown += `
            <strong>Court ${index+1}</strong><br>
            Court Fee: ₱${thisCourt.toFixed(2)}<br>
            Ball Boys: ₱${thisBallboy.toFixed(2)}<br>
            Tennis Fund: ₱${thisTennisFund.toFixed(2)}<br>
            Ball Can: ₱${thisBallcan.toFixed(2)}<br><br>
        `;
    });

    const totalGuestFees = guests * guestFee;
    const totalSharedCost = courtCost + ballboyCost + tennisFundCost + ballcanCost + totalTip;

    const feePerMember = Math.round(totalSharedCost / totalPlayers);
    const feePerGuest = Math.round(feePerMember + guestFee);
    const grandTotal = totalSharedCost + totalGuestFees;

    const paymentMessage = `Hey guys! Thanks again for the fun games 🎾

Member: ₱${feePerMember}
Guest: ₱${feePerGuest}

Please transfer to GCash:
0917 623 6323`;

    document.getElementById('results').innerHTML = `
        <strong>Guests:</strong> ${guests}<br>
        <strong>Fee per Member:</strong> ₱${feePerMember}<br>
        <strong>Fee per Guest:</strong> ₱${feePerGuest}<br>
        <strong>Grand Total:</strong> ₱${grandTotal.toFixed(2)}<br><br>

        <strong>Breakdown:</strong><br>
        ${breakdown}

        <div class="message-box" id="paymentText" contenteditable="true">${paymentMessage.replace(/\n/g,'<br>')}</div>

        <button onclick="copyMessage()" style="
            margin-top:10px;
            background:#111827;
            color:white;
            border:none;
            padding:12px;
            border-radius:16px;
            width:100%;
            cursor:pointer;
            font-weight:600;
        " id="copyBtn">📋 Copy Message</button>
    `;
}

function copyMessage() {
    const text = document.getElementById('paymentText').innerText;
    navigator.clipboard.writeText(text);

    const btn = document.getElementById('copyBtn');
    btn.innerText = 'Copied! ✅';

    setTimeout(() => {
        btn.innerText = '📋 Copy Message';
    }, 1500);
}

addCourtCard();
addCourtCard();
</script>

</body>
</html>
