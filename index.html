<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lara's Tennis Fee Calculator</title>
<style>
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f5f6fa; color:#1c1c1e; display:flex; justify-content:center; padding:20px; }
.container { max-width:900px; width:100%; background:#fff; border-radius:25px; padding:30px; box-shadow:0 12px 30px rgba(0,0,0,0.1); }
h1 { text-align:center; margin-bottom:25px; font-size:28px; color:#222; }
label { display:block; margin-top:12px; font-weight:600; }
input, select { width:100%; padding:12px 15px; margin-top:6px; border-radius:15px; border:1px solid #dcdde1; font-size:16px; background:#f8f9fa; }
button { margin-top:15px; padding:12px; width:100%; border:none; border-radius:25px; background:#1e90ff; color:white; font-size:18px; font-weight:600; cursor:pointer; transition:0.3s; }
button:hover { background:#1c7ed6; }
.court-carousel { display:flex; overflow-x:auto; scroll-behavior:smooth; margin-top:20px; padding-bottom:15px; }
.court-card { min-width:250px; background:#f1f3f5; margin-right:15px; border-radius:20px; padding:20px; flex-shrink:0; box-shadow:0 8px 20px rgba(0,0,0,0.08); }
.court-card h3 { text-align:center; margin-bottom:15px; }
.remove-btn { background:#ff6b6b; border:none; color:white; padding:8px 12px; border-radius:15px; font-weight:bold; cursor:pointer; margin-top:10px; width:100%; }
.results { margin-top:25px; background:#f1f3f5; border-radius:20px; padding:20px; font-size:16px; line-height:1.6; }
.add-btn { background:#51cf66; border-radius:25px; padding:12px; font-weight:bold; cursor:pointer; width:100%; }
</style>
</head>
<body>
<div class="container">
<h1>Lara's Tennis Fee Calculator</h1>

<label>Total Number of Players</label>
<input type="number" id="totalPlayers" min="1" value="14">

<label>Number of Members</label>
<input type="number" id="members" min="1" value="6">

<label>Guest Fee (₱ per guest)</label>
<input type="number" id="guestFee" min="0" value="250">

<label>Tennis Fund Fee per Hour per Court (₱)</label>
<input type="number" id="tennisFundFee" min="0" value="20">

<label>Total Tip (₱)</label>
<input type="number" id="totalTip" min="0" value="0">

<h2>Courts</h2>
<button class="add-btn" onclick="addCourtCard()">+ Add Court</button>
<div class="court-carousel" id="courtCarousel"></div>

<button onclick="calculateFees()">Calculate Fees</button>
<div class="results" id="results"></div>
</div>

<script>
const BALLBOY_FEE = 140;
let courtCount = 0;

function addCourtCard(hours=3, ballboys=2, lights='with', ballcan=true, ballcanFee=350) {
    courtCount++;
    const carousel = document.getElementById('courtCarousel');
    const card = document.createElement('div');
    card.className = 'court-card';
    card.id = 'courtCard'+courtCount;

    card.innerHTML = `
        <h3>Court ${courtCount}</h3>

        <label>Hours</label>
        <input type="number" value="${hours}" min="0">

        <label>Ball Boys</label>
        <input type="number" value="${ballboys}" min="0">

        <label>Lights</label>
        <select>
            <option value="with" ${lights==='with'?'selected':''}>Yes</option>
            <option value="without" ${lights==='without'?'selected':''}>No</option>
        </select>

        <label>Ball Can?</label>
        <select onchange="toggleBallCanInput(this)">
            <option value="no" ${ballcan===false?'selected':''}>No</option>
            <option value="yes" ${ballcan===true?'selected':''}>Yes</option>
        </select>

        <div class="ballcan-fee-container" style="display:${ballcan ? 'block' : 'none'};">
            <label>Ball Can Fee (₱)</label>
            <input type="number" value="${ballcanFee}" min="0">
        </div>

        <button class="remove-btn" onclick="removeCourtCard('${card.id}')">Remove Court</button>
    `;

    carousel.appendChild(card);
}

function toggleBallCanInput(select) {
    const container = select.parentElement.querySelector('.ballcan-fee-container');
    container.style.display = select.value === 'yes' ? 'block' : 'none';
}

function removeCourtCard(id) {
    document.getElementById(id).remove();
}

function calculateFees() {
    function calculateFees() {
    const totalPlayers = Number(document.getElementById('totalPlayers').value);
    const members = Number(document.getElementById('members').value);
    const guests = Math.max(0, totalPlayers - members);

    const guestFee = Number(document.getElementById('guestFee').value);
    const tennisFundFee = Number(document.getElementById('tennisFundFee').value);
    const totalTip = Number(document.getElementById('totalTip').value);

    let courtCost = 0;
    let ballboyCost = 0;
    let tennisFundCost = 0;
    let ballcanCost = 0;
    let breakdown = '';

    document.querySelectorAll('.court-card').forEach((card, index) => {
        const inputs = card.querySelectorAll('input');
        const selects = card.querySelectorAll('select');

        const hours = Number(inputs[0].value);
        const ballboys = Number(inputs[1].value);
        const lights = selects[0].value;
        const ballcan = selects[1].value;

        const courtFee = lights === 'with' ? 190 : 88;

        const thisCourt = hours * courtFee;
        const thisBallboy = hours * ballboys * 140;
        const thisTennisFund = hours * tennisFundFee;

        let thisBallcan = 0;
        if (ballcan === 'yes') {
            thisBallcan = Number(inputs[2]?.value || 0);
        }

        courtCost += thisCourt;
        ballboyCost += thisBallboy;
        tennisFundCost += thisTennisFund;
        ballcanCost += thisBallcan;

        breakdown += `
            <strong>Court ${index+1}</strong><br>
            Court Fee: ₱${thisCourt.toFixed(2)}<br>
            Ball Boys: ₱${thisBallboy.toFixed(2)}<br>
            Tennis Fund: ₱${thisTennisFund.toFixed(2)}<br>
            Ball Can: ₱${thisBallcan.toFixed(2)}<br><br>
        `;
    });

    const totalGuestFees = guests * guestFee;
    const totalSharedCost = courtCost + ballboyCost + tennisFundCost + ballcanCost + totalTip;

    const feePerMember = Math.round(totalSharedCost / totalPlayers);
    const feePerGuest = Math.round(feePerMember + guestFee);
    const grandTotal = totalSharedCost + totalGuestFees;

    const paymentMessage = `Hey guys! Thanks again for the fun games 🎾

Member: ₱${feePerMember}
Guest: ₱${feePerGuest}

Please transfer to GCash:
0917 623 6323`;

    document.getElementById('results').innerHTML = `
        <strong>Guests:</strong> ${guests}<br>
        <strong>Fee per Member:</strong> ₱${feePerMember}<br>
        <strong>Fee per Guest:</strong> ₱${feePerGuest}<br>
        <strong>Grand Total:</strong> ₱${grandTotal.toFixed(2)}<br><br>

        <strong>Breakdown:</strong><br>
        ${breakdown}

        <div class="message-box" id="paymentText" contenteditable="true">${paymentMessage.replace(/\n/g,'<br>')}</div>

        <button onclick="copyMessage()" style="
            margin-top:10px;
            background:#111827;
            color:white;
            border:none;
            padding:12px;
            border-radius:16px;
            width:100%;
            cursor:pointer;
            font-weight:600;
        " id="copyBtn">📋 Copy Message</button>
    `;
}

function copyMessage() {
    const text = document.getElementById('paymentText').innerText;
    navigator.clipboard.writeText(text);

    const btn = document.getElementById('copyBtn');
    btn.innerText = 'Copied! ✅';

    setTimeout(() => {
        btn.innerText = '📋 Copy Message';
    }, 1500);
}

// Default courts
addCourtCard(3,2,'with',true);
addCourtCard(3,2,'with',true);
</script>
</body>
</html>
